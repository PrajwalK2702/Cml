name: HeartGuard

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  actions: read

env:
  PYTHON_VERSION: '3.11'
  AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

jobs:
  workflow_overview:
    name: Workflow Overview
    runs-on: ubuntu-latest
    steps:
      - name: Show pipeline stages
        run: |
          echo "========================================="
          echo "HEARTGUARD CI/CD + DEVSECOPS PIPELINE"
          echo "========================================="
          echo "1. Build & dependency installation"
          echo "2. Django configuration validation"
          echo "3. Database migration validation"
          echo "4. Automated Django test execution"
          echo "5. Gitleaks secret scanning"
          echo "6. Deploy to AWS Elastic Beanstalk"
          echo "7. Post-deployment OWASP ZAP baseline scan"
          echo "8. Deployment health verification"
          echo "========================================="

  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: workflow_overview

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show build start
        run: echo "Starting Build & Test stage..."

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Display Python version
        run: python --version

      - name: Install Dependencies
        run: |
          echo "Installing project dependencies from requirements.txt"
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Django Configuration
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          DEBUG: "False"
        run: |
          echo "Running Django deployment checks"
          python manage.py check --deploy --fail-level WARNING || true

      - name: Run Django Migrations Check
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DEBUG: "False"
        run: |
          echo "Validating database migrations"
          python manage.py migrate --run-syncdb --check || python manage.py migrate --run-syncdb

      - name: Run Tests
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DEBUG: "False"
        run: |
          echo "Running automated Django tests"
          python manage.py test --verbosity=2

  gitleaks_scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    needs: build_and_test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Gitleaks scan start
        run: echo "Running Gitleaks secret scanning..."

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: gitleaks_scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show deployment start
        run: echo "Starting deployment to AWS Elastic Beanstalk..."

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install EB CLI
        run: |
          echo "Installing AWS Elastic Beanstalk CLI"
          python -m pip install --upgrade pip
          pip install awsebcli

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Set Environment Variables on Elastic Beanstalk
        run: |
          echo "Updating Elastic Beanstalk environment variables"
          aws elasticbeanstalk update-environment \
            --application-name ${{ secrets.EB_APP_NAME }} \
            --environment-name ${{ secrets.EB_ENV_NAME }} \
            --option-settings \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=AWS_ACCESS_KEY_ID,Value=${{ secrets.AWS_ACCESS_KEY_ID }} \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=AWS_SECRET_ACCESS_KEY,Value=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=AWS_SESSION_TOKEN,Value=${{ secrets.AWS_SESSION_TOKEN }} \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=AWS_DEFAULT_REGION,Value=${{ secrets.AWS_DEFAULT_REGION }} \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=DJANGO_SECRET_KEY,Value=${{ secrets.DJANGO_SECRET_KEY }} \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=DEBUG,Value=False \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=DJANGO_SETTINGS_MODULE,Value=cloudmachinelearning.settings

      - name: Wait for Environment to be Ready
        run: |
          echo "Waiting for Elastic Beanstalk environment to become ready..."
          aws elasticbeanstalk wait environment-updated \
            --application-name ${{ secrets.EB_APP_NAME }} \
            --environment-names ${{ secrets.EB_ENV_NAME }}

      - name: Deploy to Elastic Beanstalk
        run: |
          echo "Deploying application to Elastic Beanstalk"
          eb init ${{ secrets.EB_APP_NAME }} \
            --platform python-3.11 \
            --region ${{ secrets.AWS_DEFAULT_REGION }}
          eb use ${{ secrets.EB_ENV_NAME }}
          eb deploy --timeout 20

      - name: Verify Deployment Health
        run: |
          echo "Checking environment health after deployment"
          STATUS=$(aws elasticbeanstalk describe-environments \
            --application-name ${{ secrets.EB_APP_NAME }} \
            --environment-names ${{ secrets.EB_ENV_NAME }} \
            --query 'Environments[0].HealthStatus' \
            --output text)
          echo "Environment health: $STATUS"

      - name: Print Deployment URL
        run: |
          URL=$(aws elasticbeanstalk describe-environments \
            --application-name ${{ secrets.EB_APP_NAME }} \
            --environment-names ${{ secrets.EB_ENV_NAME }} \
            --query 'Environments[0].CNAME' \
            --output text)
          echo "HeartGuard deployed to: http://$URL"

  zap_scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Get deployed application URL
        id: app_url
        run: |
          URL=$(aws elasticbeanstalk describe-environments \
            --application-name ${{ secrets.EB_APP_NAME }} \
            --environment-names ${{ secrets.EB_ENV_NAME }} \
            --query 'Environments[0].CNAME' \
            --output text)
          echo "target=http://$URL" >> $GITHUB_OUTPUT
          echo "Running OWASP ZAP scan against: http://$URL"

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ steps.app_url.outputs.target }}
          fail_action: false
          allow_issue_writing: false

      - name: ZAP completion message
        run: echo "OWASP ZAP baseline scan completed. Review the workflow logs and artifacts for findings."